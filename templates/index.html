<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whisper Transcriber</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <header>
      <h1>Whisper Transcriber</h1>
      <p>Transcribe local audio/video files using OpenAI Whisper.</p>
    </header>

    <main>
      <section id="input-section">
        <div id="mode-toggle" role="group" aria-label="Input mode">
          <button
            type="button"
            id="btn-mode-file"
            class="mode-btn active"
            aria-pressed="true"
          >
            Upload file
          </button>
          <!-- <button
            type="button"
            id="btn-mode-url"
            class="mode-btn"
            aria-pressed="false"
          >
            YouTube URL
          </button> -->
        </div>

        <div id="panel-file" class="input-panel">
          <label for="file-input">Audio or video file</label>
          <input
            type="file"
            id="file-input"
            name="file"
            accept=".mp3,.wav,.m4a,.aac,.mp4,.mkv,.mov,.avi"
          />
          <p id="file-error" class="inline-error" aria-live="polite"></p>
        </div>

        <div id="panel-url" class="input-panel hidden">
          <label for="url-input">YouTube URL</label>
          <input
            type="url"
            id="url-input"
            name="youtube_url"
            placeholder="https://www.youtube.com/watch?v=..."
          />
          <p id="url-error" class="inline-error" aria-live="polite"></p>
        </div>
      </section>

      <div id="translate-row">
        <label>
          <input type="checkbox" id="translate-checkbox" name="translate" />
          Translate to English
        </label>
      </div>

      <button type="button" id="start-btn">Start transcription</button>

      <div id="status-area" aria-live="polite"></div>

      <section id="results" class="hidden">
        <h2>Results</h2>
        <p>Detected language: <span id="detected-language"></span></p>
        <div id="download-buttons">
          <a id="download-txt" class="download-btn" download>Download TXT</a>
          <a id="download-srt" class="download-btn" download>Download SRT</a>
          <a id="download-vtt" class="download-btn" download>Download VTT</a>
          <a id="download-pdf" class="download-btn" download>Download PDF</a>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
